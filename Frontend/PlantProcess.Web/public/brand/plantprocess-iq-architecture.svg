<svg width="1440" height="860" viewBox="0 0 1440 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="860" fill="#020712"/>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071A2D"/>
      <stop offset="100%" stop-color="#04101F"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13D8FF"/>
      <stop offset="100%" stop-color="#2DF7A3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="70" y="82" fill="#EAF7FF" font-family="Inter, Segoe UI, Arial" font-size="42" font-weight="800">
    PlantProcess IQ — Read-only Manufacturing Intelligence Architecture
  </text>
  <text x="70" y="122" fill="#91A9C5" font-family="Inter, Segoe UI, Arial" font-size="20">
    Connect → Stage → Map → Monitor → Analyze → Report. Not MES. Not SCADA. Not L2. Not BI-only.
  </text>

  <g transform="translate(70 190)">
    <rect width="230" height="150" rx="24" fill="url(#panel)" stroke="#13D8FF" stroke-opacity="0.35"/>
    <text x="28" y="44" fill="#13D8FF" font-family="Inter, Segoe UI, Arial" font-size="16" font-weight="800">SOURCE SYSTEMS</text>
    <text x="28" y="82" fill="#EAF7FF" font-family="Inter, Segoe UI, Arial" font-size="23" font-weight="800">Plant Data</text>
    <text x="28" y="116" fill="#91A9C5" font-family="Inter, Segoe UI, Arial" font-size="15">MES / L2 / QMS / DB</text>
    <text x="28" y="140" fill="#91A9C5" font-family="Inter, Segoe UI, Arial" font-size="15">CSV / Excel / PostgreSQL</text>
  </g>

  <g transform="translate(365 190)">
    <rect width="230" height="150" rx="24" fill="url(#panel)" stroke="#13D8FF" stroke-opacity="0.35"/>
    <text x="28" y="44" fill="#13D8FF" font-family="Inter, Segoe UI, Arial" font-size="16" font-weight="800">STAGING COPY</text>
    <text x="28" y="82" fill="#EAF7FF" font-family="Inter, Segoe UI, Arial" font-size="23" font-weight="800">Safe Dump</text>
    <text x="28" y="116" fill="#91A9C5" font-family="Inter, Segoe UI, Arial" font-size="15">Read-only import</text>
    <text x="28" y="140" fill="#91A9C5" font-family="Inter, Segoe UI, Arial" font-size="15">No production write-back</text>
  </g>

  <g transform="translate(660 190)">
    <rect width="230" height="150" rx="24" fill="url(#panel)" stroke="#13D8FF" stroke-opacity="0.35"/>
    <text x="28" y="44" fill="#13D8FF" font-family="Inter, Segoe UI, Arial" font-size="16" font-weight="800">SCHEMA MAPPING</text>
    <text x="28" y="82" fill="#EAF7FF" font-family="Inter, Segoe UI, Arial" font-size="23" font-weight="800">Canonical Model</text>
    <text x="28" y="116" fill="#91A9C5" font-family="Inter, Segoe UI, Arial" font-size="15">Material / Process</text>
    <text x="28" y="140" fill="#91A9C5" font-family="Inter, Segoe UI, Arial" font-size="15">Quality / Genealogy</text>
  </g>

  <g transform="translate(955 190)">
    <rect width="230" height="150" rx="24" fill="url(#panel)" stroke="#13D8FF" stroke-opacity="0.35"/>
    <text x="28" y="44" fill="#13D8FF" font-family="Inter, Segoe UI, Arial" font-size="16" font-weight="800">ANALYTICS</text>
    <text x="28" y="82" fill="#EAF7FF" font-family="Inter, Segoe UI, Arial" font-size="23" font-weight="800">Investigation</text>
    <text x="28" y="116" fill="#91A9C5" font-family="Inter, Segoe UI, Arial" font-size="15">Risk / correlation</text>
    <text x="28" y="140" fill="#91A9C5" font-family="Inter, Segoe UI, Arial" font-size="15">ML readiness</text>
  </g>

  <g transform="translate(1250 190)">
    <rect width="120" height="150" rx="24" fill="url(#cyan)" filter="url(#glow)"/>
    <text x="28" y="58" fill="#020712" font-family="Inter, Segoe UI, Arial" font-size="17" font-weight="900">REPORT</text>
    <text x="28" y="94" fill="#020712" font-family="Inter, Segoe UI, Arial" font-size="15" font-weight="700">Data</text>
    <text x="28" y="116" fill="#020712" font-family="Inter, Segoe UI, Arial" font-size="15" font-weight="700">Diagnostic</text>
  </g>

  <path d="M305 265H355" stroke="#13D8FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M600 265H650" stroke="#13D8FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M895 265H945" stroke="#13D8FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M1190 265H1240" stroke="#13D8FF" stroke-width="4" stroke-linecap="round"/>

  <g transform="translate(110 460)">
    <rect width="1220" height="250" rx="30" fill="#071A2D" fill-opacity="0.66" stroke="#2DF7A3" stroke-opacity="0.28"/>
    <text x="40" y="58" fill="#2DF7A3" font-family="Inter, Segoe UI, Arial" font-size="20" font-weight="900">
      Brand Safety Rules
    </text>
    <text x="40" y="104" fill="#EAF7FF" font-family="Inter, Segoe UI, Arial" font-size="24" font-weight="800">
      Use evidence language: rule-based risk, correlation, suspected contributors, ML readiness.
    </text>
    <text x="40" y="150" fill="#91A9C5" font-family="Inter, Segoe UI, Arial" font-size="18">
      Avoid false claims: no guaranteed root cause, no production-ready AI, no MES/SCADA/L2 replacement claims.
    </text>
    <text x="40" y="196" fill="#91A9C5" font-family="Inter, Segoe UI, Arial" font-size="18">
      Positioning: generic manufacturing intelligence layer for steel, paper, aluminum, pharma, food, chemicals, automotive and more.
    </text>
  </g>
</svg>