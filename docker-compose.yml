services:
  plantprocess-postgres:
    image: postgres:16
    container_name: plantprocess-postgres
    environment:
      POSTGRES_DB: plantprocessiq
      POSTGRES_USER: plantprocess
      POSTGRES_PASSWORD: plantprocess123
    ports:
      - "5435:5432"
    volumes:
      - plantprocess_pgdata:/var/lib/postgresql/data

  plantprocess-pgadmin:
    image: dpage/pgadmin4
    container_name: plantprocess-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@plantprocess.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - plantprocess-postgres

volumes:
  plantprocess_pgdata: