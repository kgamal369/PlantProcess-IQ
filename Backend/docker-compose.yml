services:
  db:
    image: postgres:16
    container_name: plantprocessiq-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-plantprocessiq}"
      POSTGRES_USER: "${POSTGRES_USER:-plantprocess}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-plantprocess123}"
    volumes:
      - plantprocessiq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plantprocess} -d ${POSTGRES_DB:-plantprocessiq}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: PlantProcess.Api/Dockerfile
    container_name: plantprocessiq-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-5063}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__PlantProcessDb: "Host=db;Port=5432;Database=${POSTGRES_DB:-plantprocessiq};Username=${POSTGRES_USER:-plantprocess};Password=${POSTGRES_PASSWORD:-plantprocess123}"
      PlantProcess__PlantTimeZoneId: "${PlantProcess__PlantTimeZoneId:-Europe/Berlin}"
      PlantProcess__PlantUtcOffsetMinutes: "${PlantProcess__PlantUtcOffsetMinutes:-60}"
      PlantProcess__AllowedOrigins__0: "http://localhost:${WEB_PORT:-5173}"
      PlantProcess__RequireConfiguredCors: "true"
      PlantProcess__RequireDatabaseConnectionString: "true"
      PLANTPROCESS_ALLOWED_ORIGINS: "http://localhost:${WEB_PORT:-5173},http://localhost:3000"

volumes:
  plantprocessiq_pgdata: